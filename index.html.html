<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แบบทดสอบ: กฎของโอห์ม / วงจร DC เบื้องต้น (Level 1)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Tahoma', 'Sarabun', sans-serif;
    background: #0f1620;
    color: #e8eef5;
    margin: 0;
    padding: 30px 16px;
  }
  .container { max-width: 760px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    color: #ffcf4d;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #8fa3bf;
    margin-bottom: 24px;
    font-size: 0.9rem;
  }
  #quiz-screen, #result-screen { display: block; }
  #result-screen { display: none; }

  .progress-bar {
    height: 8px;
    background: #1d2a3a;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffcf4d, #ff9d4d);
    width: 0%;
    transition: width 0.3s ease;
  }
  .q-counter {
    text-align: right;
    color: #8fa3bf;
    font-size: 0.85rem;
    margin-bottom: 10px;
  }

  .card {
    background: #16212f;
    border: 1px solid #25344a;
    border-radius: 14px;
    padding: 24px;
  }
  .question-text {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1d2a3a;
    border: 1px solid #2c3d54;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .option:hover { border-color: #ffcf4d; background: #22324a; }
  .option .letter {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #2c3d54;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; flex-shrink: 0;
  }
  .option.correct { border-color: #4caf7d; background: #163a2c; }
  .option.correct .letter { background: #4caf7d; color: #0f1620; }
  .option.wrong { border-color: #e0556b; background: #3a1620; }
  .option.wrong .letter { background: #e0556b; color: #0f1620; }
  .option.disabled { cursor: default; pointer-events: none; }

  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: #11202a;
    border-left: 4px solid #4dc4ff;
    border-radius: 8px;
    font-size: 0.92rem;
    line-height: 1.6;
    color: #cfe3f5;
    display: none;
  }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
  }
  button.next-btn {
    background: #ffcf4d;
    color: #1a1306;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.95rem;
    cursor: pointer;
    display: none;
  }
  button.next-btn:hover { background: #ffd96b; }

  #result-screen .card { text-align: center; }
  .score-big {
    font-size: 2.6rem;
    font-weight: bold;
    color: #ffcf4d;
    margin: 10px 0;
  }
  .score-label { color: #8fa3bf; margin-bottom: 20px; }
  button.restart-btn {
    background: #4dc4ff;
    color: #07202e;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button.restart-btn:hover { background: #6fd0ff; }

  .review-list { text-align: left; margin-top: 24px; }
  .review-item {
    border-top: 1px solid #25344a;
    padding: 14px 0;
    font-size: 0.9rem;
  }
  .review-item .rq { font-weight: bold; margin-bottom: 6px; }
  .review-item .ra-correct { color: #4caf7d; }
  .review-item .ra-wrong { color: #e0556b; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ แบบทดสอบ: กฎของโอห์ม / วงจร DC เบื้องต้น</h1>
  <div class="subtitle">Level 1 · 20 ข้อ</div>

  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-counter" id="qCounter">ข้อ 1 / 20</div>
    <div class="card">
      <div class="question-text" id="questionText"></div>
      <div id="optionsList"></div>
      <div class="explanation" id="explanationBox"></div>
      <div class="nav-row">
        <button class="next-btn" id="nextBtn">ข้อถัดไป →</button>
      </div>
    </div>
  </div>

  <div id="result-screen">
    <div class="card">
      <div class="score-label">คุณทำได้คะแนน</div>
      <div class="score-big" id="finalScore">0 / 20</div>
      <div class="score-label" id="scoreMsg"></div>
      <button class="restart-btn" id="restartBtn">ทำแบบทดสอบใหม่</button>
      <div class="review-list" id="reviewList"></div>
    </div>
  </div>
</div>

<script>
const questions = [
  {"question":"กฎของโอห์ม (Ohm's Law) อธิบายความสัมพันธ์ระหว่างปริมาณใด","options":["แรงดัน กระแส และความถี่","แรงดัน กระแส และความต้านทาน","กำลังไฟฟ้า ความถี่ และเวลา","ความต้านทาน ความเหนี่ยวนำ และความถี่"],"correctIndex":1,"explanation":"กฎของโอห์มกล่าวว่าแรงดันไฟฟ้า (V) มีค่าเท่ากับกระแสไฟฟ้า (I) คูณกับความต้านทาน (R) หรือ V = IR ซึ่งเป็นความสัมพันธ์พื้นฐานระหว่างแรงดัน กระแส และความต้านทานในวงจรไฟฟ้า"},
  {"question":"สูตรกฎของโอห์มที่ถูกต้องคือข้อใด","options":["V = I/R","V = I + R","V = I x R","V = R/I"],"correctIndex":2,"explanation":"สูตรกฎของโอห์มคือ V = I x R โดย V คือแรงดันไฟฟ้า (โวลต์), I คือกระแสไฟฟ้า (แอมแปร์), R คือความต้านทาน (โอห์ม)"},
  {"question":"หากวงจรมีแรงดันไฟฟ้า 12 โวลต์ และความต้านทาน 4 โอห์ม กระแสไฟฟ้าที่ไหลในวงจรมีค่าเท่าใด","options":["2 แอมแปร์","3 แอมแปร์","4 แอมแปร์","48 แอมแปร์"],"correctIndex":1,"explanation":"จากกฎของโอห์ม I = V/R = 12/4 = 3 แอมแปร์"},
  {"question":"หากกระแสไฟฟ้าไหลผ่านตัวต้านทาน 5 แอมแปร์ และความต้านทานมีค่า 10 โอห์ม แรงดันตกคร่อมตัวต้านทานมีค่าเท่าใด","options":["2 โวลต์","15 โวลต์","50 โวลต์","0.5 โวลต์"],"correctIndex":2,"explanation":"จากกฎของโอห์ม V = I x R = 5 x 10 = 50 โวลต์"},
  {"question":"หากแรงดันไฟฟ้าคร่อมตัวต้านทานเท่ากับ 24 โวลต์ และกระแสไฟฟ้าไหล 6 แอมแปร์ ความต้านทานมีค่าเท่าใด","options":["2 โอห์ม","4 โอห์ม","6 โอห์ม","144 โอห์ม"],"correctIndex":1,"explanation":"จากกฎของโอห์ม R = V/I = 24/6 = 4 โอห์ม"},
  {"question":"หน่วยของความต้านทานไฟฟ้าคือข้อใด","options":["แอมแปร์ (A)","โวลต์ (V)","โอห์ม (Ω)","วัตต์ (W)"],"correctIndex":2,"explanation":"หน่วยของความต้านทานไฟฟ้าคือโอห์ม (Ohm) ใช้สัญลักษณ์ Ω ตามชื่อของ Georg Simon Ohm ผู้คิดค้นกฎนี้"},
  {"question":"ในวงจรไฟฟ้ากระแสตรง (DC) แบบอนุกรม (Series) ปริมาณใดมีค่าเท่ากันทุกจุดในวงจร","options":["แรงดันไฟฟ้า","กระแสไฟฟ้า","ความต้านทาน","กำลังไฟฟ้า"],"correctIndex":1,"explanation":"ในวงจรอนุกรม กระแสไฟฟ้าจะมีค่าเท่ากันทุกจุด เนื่องจากมีทางเดินของกระแสเพียงทางเดียว ส่วนแรงดันจะตกคร่อมแต่ละอุปกรณ์ตามค่าความต้านทาน"},
  {"question":"ในวงจรไฟฟ้ากระแสตรง (DC) แบบขนาน (Parallel) ปริมาณใดมีค่าเท่ากันในทุกสาขาของวงจร","options":["กระแสไฟฟ้า","ความต้านทานรวม","แรงดันไฟฟ้า","กำลังไฟฟ้า"],"correctIndex":2,"explanation":"ในวงจรขนาน แรงดันไฟฟ้าจะมีค่าเท่ากันในทุกสาขา เพราะทุกสาขาต่ออยู่ระหว่างจุดเดียวกันสองจุด ส่วนกระแสจะแบ่งไปตามค่าความต้านทานของแต่ละสาขา"},
  {"question":"ตัวต้านทาน 2 ตัวต่อกันแบบอนุกรม มีค่า 3 โอห์ม และ 7 โอห์ม ความต้านทานรวมของวงจรมีค่าเท่าใด","options":["4 โอห์ม","10 โอห์ม","21 โอห์ม","2.1 โอห์ม"],"correctIndex":1,"explanation":"การต่อความต้านทานแบบอนุกรม ความต้านทานรวมเท่ากับผลรวมของความต้านทานแต่ละตัว Rรวม = R1 + R2 = 3 + 7 = 10 โอห์ม"},
  {"question":"ตัวต้านทาน 2 ตัวต่อกันแบบขนาน มีค่า 6 โอห์ม เท่ากันทั้งสองตัว ความต้านทานรวมของวงจรมีค่าเท่าใด","options":["12 โอห์ม","6 โอห์ม","3 โอห์ม","0.33 โอห์ม"],"correctIndex":2,"explanation":"สำหรับตัวต้านทาน 2 ตัวที่มีค่าเท่ากันต่อแบบขนาน ความต้านทานรวมจะลดลงครึ่งหนึ่ง คือ Rรวม = R/2 = 6/2 = 3 โอห์ม"},
  {"question":"สูตรการคำนวณความต้านทานรวมของตัวต้านทาน 2 ตัวต่อแบบขนานคือข้อใด","options":["Rรวม = R1 + R2","Rรวม = R1 x R2","1/Rรวม = 1/R1 + 1/R2","Rรวม = R1 - R2"],"correctIndex":2,"explanation":"การต่อความต้านทานแบบขนาน ส่วนกลับของความต้านทานรวมเท่ากับผลรวมของส่วนกลับของความต้านทานแต่ละตัว คือ 1/Rรวม = 1/R1 + 1/R2"},
  {"question":"สูตรการคำนวณกำลังไฟฟ้า (Power) ที่ใช้กฎของโอห์มร่วมด้วยคือข้อใด","options":["P = V/I","P = V x I","P = I/V","P = V - I"],"correctIndex":1,"explanation":"กำลังไฟฟ้าคำนวณจากสูตร P = V x I โดย P คือกำลังไฟฟ้า (วัตต์), V คือแรงดัน (โวลต์), I คือกระแส (แอมแปร์)"},
  {"question":"หากแรงดันไฟฟ้าคือ 10 โวลต์ และกระแสไฟฟ้าคือ 2 แอมแปร์ กำลังไฟฟ้าที่ใช้ไปมีค่าเท่าใด","options":["5 วัตต์","12 วัตต์","20 วัตต์","0.2 วัตต์"],"correctIndex":2,"explanation":"จากสูตร P = V x I = 10 x 2 = 20 วัตต์"},
  {"question":"สูตรกำลังไฟฟ้าที่เขียนในรูปของกระแสและความต้านทานคือข้อใด","options":["P = I x R","P = I² x R","P = I/R²","P = R/I"],"correctIndex":1,"explanation":"เมื่อแทนค่า V = IR ลงในสูตร P = VI จะได้ P = I x R x I = I²R ซึ่งเป็นสูตรกำลังไฟฟ้าในรูปของกระแสและความต้านทาน"},
  {"question":"อุปกรณ์ที่ใช้วัดกระแสไฟฟ้าโดยตรงในวงจรคือข้อใด","options":["โวลต์มิเตอร์ (Voltmeter)","แอมมิเตอร์ (Ammeter)","โอห์มมิเตอร์ (Ohmmeter)","วัตต์มิเตอร์ (Wattmeter)"],"correctIndex":1,"explanation":"แอมมิเตอร์ใช้สำหรับวัดกระแสไฟฟ้า โดยต้องต่ออนุกรมเข้ากับวงจรเพื่อให้กระแสไหลผ่านเครื่องวัด"},
  {"question":"เมื่อใช้โวลต์มิเตอร์วัดแรงดันไฟฟ้าในวงจร ต้องต่อโวลต์มิเตอร์อย่างไร","options":["ต่ออนุกรมกับอุปกรณ์ที่ต้องการวัด","ต่อขนานกับอุปกรณ์ที่ต้องการวัด","ต่อตัดวงจรหลักแล้วแทนที่อุปกรณ์","ไม่ต้องต่อเข้าวงจร"],"correctIndex":1,"explanation":"โวลต์มิเตอร์ต้องต่อแบบขนานกับอุปกรณ์ที่ต้องการวัดแรงดัน เนื่องจากแรงดันจะมีค่าเท่ากันในทุกจุดของการต่อแบบขนาน และทำให้ไม่รบกวนกระแสในวงจรหลักมากนัก"},
  {"question":"หากเพิ่มความต้านทานในวงจรโดยที่แรงดันไฟฟ้าคงที่ กระแสไฟฟ้าในวงจรจะเปลี่ยนแปลงอย่างไร","options":["กระแสไฟฟ้าเพิ่มขึ้น","กระแสไฟฟ้าลดลง","กระแสไฟฟ้าคงที่","กระแสไฟฟ้าเป็นศูนย์"],"correctIndex":1,"explanation":"จากกฎของโอห์ม I = V/R เมื่อ V คงที่ และ R เพิ่มขึ้น ค่า I จะลดลง เนื่องจากกระแสแปรผกผันกับความต้านทาน"},
  {"question":"วัสดุชนิดใดที่มีคุณสมบัตินำไฟฟ้าได้ดี (ความต้านทานต่ำ)","options":["ยาง","ทองแดง","แก้ว","พลาสติก"],"correctIndex":1,"explanation":"ทองแดงเป็นตัวนำไฟฟ้าที่ดี มีความต้านทานต่ำ จึงนิยมใช้ทำสายไฟ ส่วนยาง แก้ว และพลาสติกเป็นวัสดุฉนวนที่มีความต้านทานสูงมาก"},
  {"question":"แบตเตอรี่ขนาด 9 โวลต์ ต่อกับตัวต้านทาน 3 โอห์ม กระแสไฟฟ้าที่ไหลในวงจรมีค่าเท่าใด","options":["1 แอมแปร์","3 แอมแปร์","27 แอมแปร์","0.33 แอมแปร์"],"correctIndex":1,"explanation":"จากกฎของโอห์ม I = V/R = 9/3 = 3 แอมแปร์"},
  {"question":"หากต้องการให้กระแสไฟฟ้าในวงจรไหล 0.5 แอมแปร์ โดยใช้แหล่งจ่ายไฟ 5 โวลต์ ต้องใช้ตัวต้านทานค่าเท่าใด","options":["2.5 โอห์ม","10 โอห์ม","0.1 โอห์ม","5.5 โอห์ม"],"correctIndex":1,"explanation":"จากกฎของโอห์ม R = V/I = 5/0.5 = 10 โอห์ม"}
];

const letters = ["ก","ข","ค","ง"];
let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];

const questionText = document.getElementById('questionText');
const optionsList = document.getElementById('optionsList');
const explanationBox = document.getElementById('explanationBox');
const nextBtn = document.getElementById('nextBtn');
const qCounter = document.getElementById('qCounter');
const progressFill = document.getElementById('progressFill');
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');

function renderQuestion() {
  answered = false;
  const q = questions[current];
  questionText.textContent = (current+1) + ". " + q.question;
  qCounter.textContent = "ข้อ " + (current+1) + " / " + questions.length;
  progressFill.style.width = ((current) / questions.length * 100) + "%";
  explanationBox.style.display = "none";
  explanationBox.textContent = "";
  nextBtn.style.display = "none";

  optionsList.innerHTML = "";
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = "option";
    div.innerHTML = '<div class="letter">' + letters[idx] + '</div><div>' + opt + '</div>';
    div.addEventListener('click', () => selectAnswer(idx));
    optionsList.appendChild(div);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = optionsList.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));

  if (idx === q.correctIndex) {
    score++;
    opts[idx].classList.add('correct');
  } else {
    opts[idx].classList.add('wrong');
    opts[q.correctIndex].classList.add('correct');
  }

  userAnswers.push({question: q.question, options: q.options, selected: idx, correctIndex: q.correctIndex, explanation: q.explanation});

  explanationBox.textContent = "💡 " + q.explanation;
  explanationBox.style.display = "block";
  nextBtn.style.display = "inline-block";
  nextBtn.textContent = (current === questions.length - 1) ? "ดูผลคะแนน →" : "ข้อถัดไป →";
}

nextBtn.addEventListener('click', () => {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
});

function showResult() {
  progressFill.style.width = "100%";
  quizScreen.style.display = "none";
  resultScreen.style.display = "block";
  document.getElementById('finalScore').textContent = score + " / " + questions.length;

  const pct = Math.round(score / questions.length * 100);
  let msg = "";
  if (pct >= 80) msg = "ยอดเยี่ยมมาก! เข้าใจกฎของโอห์มดีเยี่ยม 🎉";
  else if (pct >= 60) msg = "ดีมาก ใกล้เข้าใจครบแล้ว ลองทบทวนอีกนิด";
  else msg = "ควรทบทวนเรื่องกฎของโอห์มและวงจร DC เพิ่มเติม";
  document.getElementById('scoreMsg').textContent = msg + " (" + pct + "%)";

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = "<h3 style='color:#ffcf4d;margin-top:30px;'>เฉลยและคำอธิบาย</h3>";
  userAnswers.forEach((a, i) => {
    const isCorrect = a.selected === a.correctIndex;
    const div = document.createElement('div');
    div.className = "review-item";
    div.innerHTML = `
      <div class="rq">${i+1}. ${a.question}</div>
      <div class="${isCorrect ? 'ra-correct' : 'ra-wrong'}">
        คำตอบของคุณ: ${letters[a.selected]}. ${a.options[a.selected]} ${isCorrect ? '✓' : '✗'}
      </div>
      ${!isCorrect ? `<div class="ra-correct">คำตอบที่ถูก: ${letters[a.correctIndex]}. ${a.options[a.correctIndex]}</div>` : ''}
      <div style="color:#8fa3bf;margin-top:4px;">${a.explanation}</div>
    `;
    reviewList.appendChild(div);
  });
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0;
  score = 0;
  userAnswers = [];
  resultScreen.style.display = "none";
  quizScreen.style.display = "block";
  renderQuestion();
});

renderQuestion();
</script>
</body>
</html>
